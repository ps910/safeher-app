name: Build SafeHer APK

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Install JS dependencies
      - name: Install dependencies
        run: npm ci || npm install

      # 4. Setup Java 17 (required for Gradle)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # 5. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 6. Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 7. Make gradlew executable
      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      # 8. Generate Expo autolinking
      - name: Run Expo prebuild config
        run: npx expo prebuild --platform android --no-install 2>/dev/null || true

      # 9. Build the APK
      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # 10. Find and rename APK
      - name: Find APK
        id: find_apk
        run: |
          APK_PATH=$(find android/app/build/outputs -name "*.apk" -type f | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK at: $APK_PATH"

      # 11. Upload APK as artifact (downloadable from GitHub)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SafeHer-v4.1.0
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 90
          if-no-files-found: error
