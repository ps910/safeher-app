name: Build SafeHer APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Free up disk space and add swap to prevent OOM during native C++ builds
      - name: Free disk space & add swap
        run: |
          sudo swapoff -a
          sudo fallocate -l 10G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo swapon --show
          echo "--- Free memory ---"
          free -h
          echo "--- Disk space ---"
          df -h /

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      # Regenerate autolinking for CI environment
      - name: Expo prebuild
        run: npx expo prebuild --platform android --no-install 2>/dev/null || true

      # ═══ THE KEY FIX: Build only arm64, disable New Arch, skip lint, max memory ═══
      - name: Build Release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --max-workers=2 \
            -PreactNativeArchitectures=arm64-v8a \
            -PnewArchEnabled=true \
            -x lint \
            -x lintVitalRelease \
            -x lintVitalAnalyzeRelease \
            -x lintVitalReportRelease \
            -x lintVitalAnalyzeDebug \
            --warning-mode=none
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.jvmargs=-Xmx4g
            -XX:MaxMetaspaceSize=1g
            -XX:+UseParallelGC
            -XX:+HeapDumpOnOutOfMemoryError

      - name: Find APK
        id: find_apk
        run: |
          APK_PATH=$(find android/app/build/outputs -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found!"
            find android/app/build/outputs -type f 2>/dev/null || echo "No outputs directory"
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "✅ Found APK at: $APK_PATH"
          ls -lh "$APK_PATH"

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: SafeHer-v4.1.0
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 90
          if-no-files-found: error
